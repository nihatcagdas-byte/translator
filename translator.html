<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Translator — EN › TR</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --accent-l: #4fc3f7;
    --accent-r: #69f0ae;
    --text: #e8eaf0;
    --muted: #5a5f72;
    --border: #1e2030;
    --en-color: #b3e5fc;
    --tr-color: #80cbc4;
    --resp-en: #c8e6c9;
    --resp-tr: #a5d6a7;
    --glow-l: rgba(79,195,247,0.08);
    --glow-r: rgba(105,240,174,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Mono',monospace; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* HEADER */
  header { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; border-bottom:1px solid var(--border); background:rgba(10,10,15,0.95); backdrop-filter:blur(12px); flex-shrink:0; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; letter-spacing:0.08em; display:flex; align-items:center; gap:10px; }
  .logo-dot { width:8px; height:8px; border-radius:50%; background:var(--accent-l); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  .controls { display:flex; align-items:center; gap:8px; }
  .api-group { display:flex; align-items:center; gap:6px; }
  .api-input { background:#0f1117; border:1px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:0.72rem; padding:7px 12px; border-radius:6px; width:210px; outline:none; transition:border-color 0.2s; }
  .api-input:focus { border-color:var(--accent-l); }
  .api-input::placeholder { color:var(--muted); }
  .api-input:disabled { opacity:0.5; cursor:not-allowed; }

  .btn { font-family:'Syne',sans-serif; font-weight:700; font-size:0.7rem; letter-spacing:0.08em; padding:7px 13px; border-radius:6px; border:none; cursor:pointer; transition:all 0.2s; text-transform:uppercase; white-space:nowrap; }
  .btn-save { background:rgba(105,240,174,0.15); color:var(--accent-r); border:1px solid rgba(105,240,174,0.3); }
  .btn-save:hover { background:rgba(105,240,174,0.25); }
  .btn-del-key { background:rgba(239,83,80,0.12); color:#ef5350; border:1px solid rgba(239,83,80,0.25); display:none; }
  .btn-del-key:hover { background:rgba(239,83,80,0.22); }
  .btn-clear { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-clear:hover { border-color:var(--muted); color:var(--text); }
  .btn-start { background:var(--accent-l); color:#000; padding:8px 18px; font-size:0.73rem; }
  .btn-start:hover { filter:brightness(1.15); transform:translateY(-1px); }
  .btn-start.active { background:#ef5350; color:#fff; animation:rec-pulse 1.5s infinite; }
  @keyframes rec-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,83,80,0.4)} 50%{box-shadow:0 0 0 6px rgba(239,83,80,0)} }

  .status-pill { font-size:0.63rem; padding:4px 10px; border-radius:20px; background:var(--border); color:var(--muted); letter-spacing:0.08em; }
  .status-pill.listening { background:rgba(105,240,174,0.15); color:var(--accent-r); }
  .status-pill.processing { background:rgba(79,195,247,0.15); color:var(--accent-l); }
  .status-pill.error { background:rgba(239,83,80,0.15); color:#ef5350; }
  .status-pill.saved { background:rgba(105,240,174,0.12); color:var(--accent-r); }

  .waveform { display:flex; align-items:center; gap:3px; height:20px; }
  .waveform-bar { width:3px; border-radius:2px; background:var(--accent-l); animation:wave 0.8s ease-in-out infinite; }
  .waveform-bar:nth-child(2){animation-delay:0.1s;height:60%}
  .waveform-bar:nth-child(3){animation-delay:0.2s;height:100%}
  .waveform-bar:nth-child(4){animation-delay:0.3s;height:70%}
  .waveform-bar:nth-child(5){animation-delay:0.15s;height:50%}
  @keyframes wave { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }
  .waveform-wrap { display:none; }
  .waveform-wrap.active { display:flex; align-items:center; gap:6px; }

  /* DIRECTION BAR */
  .direction-bar {
    display:flex; align-items:center; justify-content:center;
    padding:8px 24px; border-bottom:1px solid var(--border);
    background:rgba(10,10,15,0.6); flex-shrink:0; gap:16px;
  }
  .dir-label {
    font-family:'Syne',sans-serif; font-size:0.72rem; font-weight:700;
    letter-spacing:0.1em; color:var(--muted); transition:color 0.3s;
  }
  .dir-label.active-dir { color:var(--text); }

  .dir-toggle-wrap { position:relative; }
  .dir-toggle-btn {
    font-family:'Syne',sans-serif; font-weight:800; font-size:0.95rem;
    background:rgba(255,255,255,0.05); border:1px solid var(--border);
    color:var(--text); padding:6px 18px; border-radius:30px; cursor:pointer;
    transition:all 0.25s; letter-spacing:0.05em;
    display:flex; align-items:center; gap:8px;
  }
  .dir-toggle-btn:hover { background:rgba(255,255,255,0.1); border-color:var(--accent-l); }
  .dir-arrow { display:inline-block; transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); font-size:1.1rem; }
  .dir-toggle-btn.flipped .dir-arrow { transform:rotate(180deg); }
  .dir-mode-badge {
    font-size:0.58rem; padding:2px 8px; border-radius:10px;
    background:rgba(79,195,247,0.15); color:var(--accent-l);
    letter-spacing:0.1em; font-weight:700;
  }
  .dir-toggle-btn.flipped .dir-mode-badge { background:rgba(255,183,77,0.15); color:#ffb74d; }

  /* COL LABELS */
  .col-labels { display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid var(--border); flex-shrink:0; }
  .col-label { padding:9px 24px; font-family:'Syne',sans-serif; font-size:0.63rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; display:flex; align-items:center; gap:8px; transition:all 0.3s; }
  .col-label-l { color:var(--accent-l); border-right:1px solid var(--border); background:var(--glow-l); }
  .col-label-r { color:var(--accent-r); background:var(--glow-r); }
  .col-tag { font-size:0.57rem; padding:2px 7px; border-radius:4px; font-weight:400; opacity:0.7; }
  .col-label-l .col-tag { background:rgba(79,195,247,0.15); color:var(--accent-l); }
  .col-label-r .col-tag { background:rgba(105,240,174,0.15); color:var(--accent-r); }

  /* PANELS */
  .panels { display:grid; grid-template-columns:1fr 1fr; flex:1; overflow:hidden; }
  .panel { display:flex; flex-direction:column; overflow:hidden; }
  .panel-l { border-right:1px solid var(--border); background:radial-gradient(ellipse at top left,var(--glow-l),transparent 60%); }
  .panel-r { background:radial-gradient(ellipse at top right,var(--glow-r),transparent 60%); }
  .messages { flex:1; overflow-y:auto; padding:18px 22px; display:flex; flex-direction:column; gap:14px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .messages::-webkit-scrollbar{width:4px} .messages::-webkit-scrollbar-track{background:transparent} .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  /* CARDS */
  .msg-card { border-radius:10px; overflow:hidden; border:1px solid var(--border); animation:slideIn 0.35s cubic-bezier(0.34,1.56,0.64,1); opacity:0; animation-fill-mode:forwards; }
  @keyframes slideIn { from{opacity:0;transform:translateY(12px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  .msg-row-top { padding:12px 16px; font-size:0.86rem; line-height:1.6; border-bottom:1px solid var(--border); }
  .msg-row-bot { padding:10px 16px; font-size:0.79rem; line-height:1.6; }
  .msg-meta { padding:5px 16px; font-size:0.59rem; color:var(--muted); background:rgba(0,0,0,0.15); display:flex; justify-content:space-between; }
  .lang-badge { display:inline-block; font-size:0.57rem; padding:1px 6px; border-radius:3px; margin-right:6px; font-weight:600; letter-spacing:0.1em; vertical-align:middle; }
  .badge-en { background:rgba(79,195,247,0.2); color:var(--accent-l); }
  .badge-tr { background:rgba(128,203,196,0.2); color:var(--tr-color); }
  .badge-resp { background:rgba(105,240,174,0.2); color:var(--accent-r); }
  .badge-tr-input { background:rgba(255,183,77,0.2); color:#ffb74d; }

  /* LOADING */
  .loading-card { border-radius:10px; border:1px solid var(--border); padding:14px 16px; display:flex; align-items:center; gap:12px; animation:slideIn 0.3s ease forwards; opacity:0; }
  .loading-dots { display:flex; gap:5px; }
  .loading-dots span { width:6px; height:6px; border-radius:50%; background:var(--accent-l); animation:dot-bounce 1.2s infinite; }
  .loading-dots span:nth-child(2){animation-delay:0.2s;background:var(--accent-r)} .loading-dots span:nth-child(3){animation-delay:0.4s}
  @keyframes dot-bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-6px);opacity:1} }
  .loading-text { font-size:0.74rem; color:var(--muted); }

  /* BOTTOM BARS */
  .interim-bar { padding:9px 22px; border-top:1px solid var(--border); background:rgba(0,0,0,0.3); font-size:0.76rem; color:var(--muted); min-height:36px; display:flex; align-items:center; gap:8px; flex-shrink:0; font-style:italic; }
  .interim-icon { width:7px; height:7px; border-radius:50%; background:var(--accent-r); flex-shrink:0; animation:pulse 1s infinite; }
  .tr-speak-bar { padding:9px 14px; border-top:1px solid var(--border); background:rgba(0,0,0,0.3); flex-shrink:0; display:flex; flex-direction:column; gap:5px; }
  .tr-interim { font-size:0.71rem; color:#ffb74d; min-height:15px; font-style:italic; opacity:0.85; padding:0 2px; }
  .btn-tr-speak { font-family:'Syne',sans-serif; font-weight:700; font-size:0.71rem; letter-spacing:0.06em; text-transform:uppercase; padding:9px 16px; border-radius:8px; border:1px solid rgba(255,183,77,0.3); cursor:pointer; width:100%; background:rgba(255,183,77,0.08); color:#ffb74d; transition:all 0.2s; }
  .btn-tr-speak:hover { background:rgba(255,183,77,0.18); }
  .btn-tr-speak.active { background:rgba(255,183,77,0.2); color:#ffe082; border-color:rgba(255,183,77,0.55); animation:tr-pulse 1.5s infinite; }
  @keyframes tr-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,183,77,0.3)} 50%{box-shadow:0 0 0 5px rgba(255,183,77,0)} }

  /* EMPTY */
  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); font-size:0.79rem; text-align:center; padding:24px; }
  .empty-icon { font-size:2rem; opacity:0.3; }
  .empty-hint { font-size:0.68rem; opacity:0.6; max-width:200px; line-height:1.6; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    LIVE TRANSLATOR
  </div>
  <div class="controls">
    <div class="api-group">
      <input class="api-input" id="apiKey" type="password" placeholder="Groq API Key (gsk_...)">
      <button class="btn btn-save" id="saveKeyBtn" onclick="saveApiKey()">💾 Kaydet</button>
      <button class="btn btn-del-key" id="delKeyBtn" onclick="deleteApiKey()">🗑 Sil</button>
    </div>
    <span class="status-pill" id="statusPill">HAZIR</span>
    <div class="waveform-wrap" id="waveformWrap">
      <div class="waveform">
        <div class="waveform-bar" style="height:40%"></div>
        <div class="waveform-bar" style="height:60%"></div>
        <div class="waveform-bar" style="height:100%"></div>
        <div class="waveform-bar" style="height:70%"></div>
        <div class="waveform-bar" style="height:50%"></div>
      </div>
    </div>
    <button class="btn btn-clear" onclick="clearAll()">TEMİZLE</button>
    <button class="btn btn-start" id="startBtn" onclick="toggleListening()">▶ BAŞLAT</button>
  </div>
</header>

<!-- YÖN DEĞİŞTİRME BUTONU -->
<div class="direction-bar">
  <span class="dir-label active-dir" id="dirLabelLeft">🇬🇧 İngilizce</span>
  <button class="dir-toggle-btn" id="dirBtn" onclick="toggleDirection()">
    <span class="dir-arrow">⇄</span>
    <span class="dir-mode-badge" id="dirBadge">EN → TR</span>
  </button>
  <span class="dir-label" id="dirLabelRight">🇹🇷 Türkçe</span>
</div>

<div class="col-labels">
  <div class="col-label col-label-l" id="colLabelL">
    🎤 <span id="colLabelLText">Konuşma (İngilizce)</span>
    <span class="col-tag" id="colTagL">Dinleniyor → Çevriliyor</span>
  </div>
  <div class="col-label col-label-r" id="colLabelR">
    💡 <span id="colLabelRText">Yanıt Önerisi</span>
    <span class="col-tag" id="colTagR">AI + TR Konuşma</span>
  </div>
</div>

<div class="panels">
  <div class="panel panel-l">
    <div class="messages" id="leftMessages">
      <div class="empty-state" id="leftEmpty">
        <div class="empty-icon">🎙️</div>
        <div id="leftEmptyText">Ses bekleniyor...</div>
        <div class="empty-hint" id="leftEmptyHint">API anahtarını kaydet, başlat düğmesine bas ve İngilizce konuş</div>
      </div>
    </div>
    <div class="interim-bar">
      <div class="interim-icon" style="display:none" id="interimDot"></div>
      <span id="interimText">Dinleme başlatılmadı</span>
    </div>
  </div>

  <div class="panel panel-r">
    <div class="messages" id="rightMessages">
      <div class="empty-state" id="rightEmpty">
        <div class="empty-icon">💬</div>
        <div>Yanıt bekleniyor...</div>
        <div class="empty-hint">Konuşma algılandığında burada görünür</div>
      </div>
    </div>
    <div class="tr-speak-bar" id="trSpeakBar">
      <div class="tr-interim" id="trInterim"></div>
      <button class="btn-tr-speak" id="trSpeakBtn" onclick="toggleTrSpeak()">🇹🇷 Türkçe Konuş → İngilizceye Çevir</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let recognition = null;
let isListening = false;
let processingQueue = [];
let isProcessing = false;
let trRecognition = null;
let isTrListening = false;

// mode: 'en-tr' = İngilizce dinle → Türkçe çevir
//       'tr-en' = Türkçe dinle → İngilizce çevir
let currentMode = 'en-tr';

const STORAGE_KEY = 'groq_api_key_v1';

// ── ON LOAD ──
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    document.getElementById('apiKey').value = saved;
    document.getElementById('apiKey').disabled = true;
    document.getElementById('saveKeyBtn').style.display = 'none';
    document.getElementById('delKeyBtn').style.display = 'inline-block';
    setStatus('ANAHTAR KAYITLI', 'saved');
  }
});

// ── DIRECTION TOGGLE ──
function toggleDirection() {
  // Dinleme açıksa durdur
  if (isListening) {
    isListening = false;
    try { recognition.stop(); } catch(e){}
    recognition = null;
    document.getElementById('startBtn').textContent = '▶ BAŞLAT';
    document.getElementById('startBtn').classList.remove('active');
    document.getElementById('waveformWrap').classList.remove('active');
  }
  if (isTrListening) {
    isTrListening = false;
    try { trRecognition.stop(); } catch(e){}
    trRecognition = null;
  }

  currentMode = currentMode === 'en-tr' ? 'tr-en' : 'en-tr';
  updateDirectionUI();
  clearAll();
}

function updateDirectionUI() {
  const btn = document.getElementById('dirBtn');
  const badge = document.getElementById('dirBadge');
  const labelLeft = document.getElementById('dirLabelLeft');
  const labelRight = document.getElementById('dirLabelRight');

  if (currentMode === 'en-tr') {
    btn.classList.remove('flipped');
    badge.textContent = 'EN → TR';
    labelLeft.textContent = '🇬🇧 İngilizce';
    labelLeft.classList.add('active-dir');
    labelRight.textContent = '🇹🇷 Türkçe';
    labelRight.classList.remove('active-dir');

    document.getElementById('colLabelLText').textContent = 'Konuşma (İngilizce)';
    document.getElementById('colTagL').textContent = 'Dinleniyor → Çevriliyor';
    document.getElementById('colLabelRText').textContent = 'Yanıt Önerisi';
    document.getElementById('colTagR').textContent = 'AI + TR Konuşma';

    document.getElementById('leftEmptyText').textContent = 'Ses bekleniyor...';
    document.getElementById('leftEmptyHint').textContent = 'Başlat düğmesine bas ve İngilizce konuş';
    document.getElementById('interimText').textContent = 'Dinleme başlatılmadı';

    // Türkçe konuş butonu göster
    document.getElementById('trSpeakBar').style.display = 'flex';
    document.getElementById('trSpeakBtn').textContent = '🇹🇷 Türkçe Konuş → İngilizceye Çevir';

  } else {
    btn.classList.add('flipped');
    badge.textContent = 'TR → EN';
    badge.style.background = 'rgba(255,183,77,0.15)';
    badge.style.color = '#ffb74d';
    labelLeft.textContent = '🇹🇷 Türkçe';
    labelLeft.classList.add('active-dir');
    labelRight.textContent = '🇬🇧 İngilizce';
    labelRight.classList.remove('active-dir');

    document.getElementById('colLabelLText').textContent = 'Konuşma (Türkçe)';
    document.getElementById('colTagL').textContent = 'Dinleniyor → Çevriliyor';
    document.getElementById('colLabelRText').textContent = 'Yanıt Önerisi (EN)';
    document.getElementById('colTagR').textContent = 'AI İngilizce Yanıt';

    document.getElementById('leftEmptyText').textContent = 'Ses bekleniyor...';
    document.getElementById('leftEmptyHint').textContent = 'Başlat düğmesine bas ve Türkçe konuş';
    document.getElementById('interimText').textContent = 'Dinleme başlatılmadı';

    // TR modunda alt buton gizle (zaten ana dinleme TR)
    document.getElementById('trSpeakBar').style.display = 'none';

    // Badge rengini sıfırla
    badge.style.background = '';
    badge.style.color = '';
  }
}

// ── API KEY ──
function saveApiKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) { alert('Lütfen bir API anahtarı girin!'); return; }
  localStorage.setItem(STORAGE_KEY, key);
  document.getElementById('apiKey').disabled = true;
  document.getElementById('saveKeyBtn').style.display = 'none';
  document.getElementById('delKeyBtn').style.display = 'inline-block';
  setStatus('ANAHTAR KAYITLI', 'saved');
}

function deleteApiKey() {
  if (!confirm('API anahtarı silinsin mi?')) return;
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('apiKey').value = '';
  document.getElementById('apiKey').disabled = false;
  document.getElementById('saveKeyBtn').style.display = 'inline-block';
  document.getElementById('delKeyBtn').style.display = 'none';
  setStatus('ANAHTAR SİLİNDİ', '');
}

function getApiKey() {
  return localStorage.getItem(STORAGE_KEY) || document.getElementById('apiKey').value.trim();
}

// ── RECOGNITION SETUP ──
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Chrome kullanın — Web Speech API gerekli.'); return false; }

  recognition = new SR();
  // Moda göre dil seç
  recognition.lang = currentMode === 'en-tr' ? 'en-US' : 'tr-TR';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    setStatus('DİNLİYOR', 'listening');
    document.getElementById('interimDot').style.display = 'block';
    document.getElementById('interimText').textContent = currentMode === 'en-tr' ? 'İngilizce konuşmanızı bekliyorum...' : 'Türkçe konuşmanızı bekliyorum...';
    document.getElementById('waveformWrap').classList.add('active');
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        const c = t.trim();
        if (c.length > 2) { processingQueue.push(c); processNext(); }
        interim = '';
      } else { interim += t; }
    }
    if (interim) document.getElementById('interimText').textContent = '▸ ' + interim;
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    setStatus('HATA: ' + e.error, 'error');
  };

  recognition.onend = () => {
    if (isListening) {
      setTimeout(() => { try { recognition.start(); } catch(e){} }, 200);
    } else {
      setStatus('DURDURULDU', '');
      document.getElementById('waveformWrap').classList.remove('active');
      document.getElementById('interimDot').style.display = 'none';
      document.getElementById('interimText').textContent = 'Dinleme durduruldu';
    }
  };
  return true;
}

function toggleListening() {
  const apiKey = getApiKey();
  if (!apiKey) { alert('Lütfen önce API anahtarını girin ve kaydedin!'); return; }
  const btn = document.getElementById('startBtn');
  if (!isListening) {
    recognition = null; // her başlatmada sıfırla (mod değişmiş olabilir)
    if (!setupRecognition()) return;
    isListening = true;
    btn.textContent = '⏹ DURDUR';
    btn.classList.add('active');
    try { recognition.start(); } catch(e) {}
  } else {
    isListening = false;
    btn.textContent = '▶ BAŞLAT';
    btn.classList.remove('active');
    try { recognition.stop(); } catch(e) {}
  }
}

// ── TURKISH SPEAK BUTTON (sadece EN→TR modda) ──
function setupTrRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  trRecognition = new SR();
  trRecognition.lang = 'tr-TR';
  trRecognition.continuous = false;
  trRecognition.interimResults = true;

  trRecognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        const c = t.trim();
        if (c.length > 1) { document.getElementById('trInterim').textContent = ''; processTurkishBtn(c); }
      } else { interim += t; }
    }
    if (interim) document.getElementById('trInterim').textContent = '▸ ' + interim;
  };
  trRecognition.onerror = (e) => { if (e.error !== 'no-speech') console.error('TR err:', e.error); };
  trRecognition.onend = () => {
    isTrListening = false;
    const btn = document.getElementById('trSpeakBtn');
    btn.textContent = '🇹🇷 Türkçe Konuş → İngilizceye Çevir';
    btn.classList.remove('active');
    document.getElementById('trInterim').textContent = '';
  };
  return true;
}

function toggleTrSpeak() {
  const apiKey = getApiKey();
  if (!apiKey) { alert('Lütfen önce API anahtarını kaydedin!'); return; }
  const btn = document.getElementById('trSpeakBtn');
  if (!isTrListening) {
    if (!trRecognition && !setupTrRecognition()) return;
    isTrListening = true;
    btn.textContent = '⏹ Dinleniyor... (durdurmak için tıkla)';
    btn.classList.add('active');
    document.getElementById('trInterim').textContent = 'Türkçe konuşun...';
    try { trRecognition.start(); } catch(e) {}
  } else {
    isTrListening = false;
    try { trRecognition.stop(); } catch(e) {}
  }
}

// ── PROCESS QUEUE ──
async function processNext() {
  if (isProcessing || processingQueue.length === 0) return;
  isProcessing = true;
  const text = processingQueue.shift();
  if (currentMode === 'en-tr') {
    await processEN(text);
  } else {
    await processTR(text);
  }
  isProcessing = false;
  processNext();
}

// ── EN → TR ──
async function processEN(englishText) {
  const apiKey = getApiKey();
  const ts = timestamp();
  const llId = addLoading('leftMessages', 'Çevriliyor...');
  const rlId = addLoading('rightMessages', 'Yanıt üretiliyor...');
  setStatus('İŞLENİYOR', 'processing');
  try {
    const result = await callGroqEN(apiKey, englishText);
    removeLoading(llId); removeLoading(rlId);
    addCard('leftMessages', [{badge:'badge-en',label:'EN',text:englishText,topColor:'rgba(179,229,252,0.04)',textColor:''},{badge:'badge-tr',label:'TR',text:result.translation,topColor:'rgba(128,203,196,0.05)',textColor:''}], ts, 'konuşma');
    addCard('rightMessages', [{badge:'badge-resp',label:'EN',text:result.response,topColor:'rgba(200,230,201,0.04)',textColor:''},{badge:'badge-tr',label:'TR',text:result.responseTr,topColor:'rgba(165,214,167,0.05)',textColor:''}], ts, 'önerilen yanıt');
    hideEmpty(); setStatus('DİNLİYOR', 'listening');
  } catch(err) {
    removeLoading(llId); removeLoading(rlId);
    setStatus('API HATASI', 'error');
    addErrorCard(englishText, err.message, ts);
  }
}

// ── TR → EN (ana dinleme) ──
async function processTR(turkishText) {
  const apiKey = getApiKey();
  const ts = timestamp();
  const llId = addLoading('leftMessages', 'Çevriliyor...');
  const rlId = addLoading('rightMessages', 'Yanıt üretiliyor...');
  setStatus('İŞLENİYOR', 'processing');
  try {
    const result = await callGroqTR(apiKey, turkishText);
    removeLoading(llId); removeLoading(rlId);
    addCard('leftMessages', [{badge:'badge-tr-input',label:'TR',text:turkishText,topColor:'rgba(255,183,77,0.04)',textColor:'#ffb74d'},{badge:'badge-en',label:'EN',text:result.translation,topColor:'rgba(179,229,252,0.04)',textColor:''}], ts, 'konuşma');
    addCard('rightMessages', [{badge:'badge-tr-input',label:'TR',text:result.response,topColor:'rgba(255,183,77,0.04)',textColor:'#ffb74d'},{badge:'badge-en',label:'EN',text:result.responseTr,topColor:'rgba(200,230,201,0.04)',textColor:''}], ts, 'önerilen yanıt');
    hideEmpty(); setStatus('DİNLİYOR', 'listening');
  } catch(err) {
    removeLoading(llId); removeLoading(rlId);
    setStatus('API HATASI', 'error');
    addErrorCard(turkishText, err.message, ts);
  }
}

// ── TR BUTTON → EN (EN→TR modda sağ panel) ──
async function processTurkishBtn(turkishText) {
  const apiKey = getApiKey();
  const ts = timestamp();
  const loadId = addLoading('rightMessages', 'İngilizceye çevriliyor...');
  hideEmpty();
  try {
    const result = await callGroqSimpleTR(apiKey, turkishText);
    removeLoading(loadId);
    addCard('rightMessages', [
      {badge:'badge-tr-input',label:'TR',text:turkishText,topColor:'rgba(255,183,77,0.04)',textColor:'#ffb74d'},
      {badge:'badge-en',label:'EN',text:result.english,topColor:'rgba(179,229,252,0.04)',textColor:'#ffe082'}
    ], ts, 'türkçe → ingilizce', 'rgba(255,183,77,0.3)');
  } catch(err) {
    removeLoading(loadId);
    const el = document.createElement('div');
    el.className = 'msg-card'; el.style.borderColor='#ef5350';
    el.innerHTML = `<div style="padding:12px 16px;font-size:0.75rem;color:#ef5350;">⚠ Hata: ${escHtml(err.message)}</div>`;
    appendMsg('rightMessages', el);
  }
}

// ── GROQ CALLS ──
async function callGroqEN(apiKey, text) {
  const prompt = `Someone said in English during a Teams call: "${text}"\n\nReturn ONLY valid JSON:\n{"translation":"Turkish translation","response":"Smart natural English reply (max 2 sentences)","responseTr":"Turkish translation of the reply"}`;
  return await groqFetch(apiKey, prompt, 1000);
}

async function callGroqTR(apiKey, text) {
  const prompt = `Someone said in Turkish during a Teams call: "${text}"\n\nReturn ONLY valid JSON:\n{"translation":"English translation of what was said","response":"Smart natural Turkish reply suggestion (max 2 sentences)","responseTr":"English translation of that Turkish reply"}`;
  return await groqFetch(apiKey, prompt, 1000);
}

async function callGroqSimpleTR(apiKey, text) {
  const prompt = `Translate this Turkish text to natural English: "${text}"\n\nReturn ONLY valid JSON: {"english":"English translation"}`;
  return await groqFetch(apiKey, prompt, 400);
}

async function groqFetch(apiKey, prompt, maxTokens) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
    body:JSON.stringify({
      model:'llama-3.3-70b-versatile', max_tokens:maxTokens,
      messages:[
        {role:'system',content:'Translation and conversation assistant. Always respond ONLY with valid JSON, no markdown, no backticks.'},
        {role:'user',content:prompt}
      ]
    })
  });
  if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.error?.message||`HTTP ${res.status}`); }
  const data = await res.json();
  return JSON.parse(data.choices[0].message.content.replace(/```json|```/g,'').trim());
}

// ── DOM HELPERS ──
function addCard(containerId, rows, time, label, borderColor) {
  const el = document.createElement('div');
  el.className = 'msg-card';
  if (borderColor) el.style.borderColor = borderColor;
  let html = '';
  rows.forEach((row, i) => {
    const isTop = i === 0;
    const cls = isTop ? 'msg-row-top' : 'msg-row-bot';
    const extra = row.textColor ? `color:${row.textColor};` : '';
    html += `<div class="${cls}" style="background:${row.topColor};${extra}"><span class="lang-badge ${row.badge}">${row.label}</span>${escHtml(row.text)}</div>`;
  });
  html += `<div class="msg-meta"><span>${time}</span><span>${label}</span></div>`;
  el.innerHTML = html;
  appendMsg(containerId, el);
}

function addErrorCard(text, errMsg, time) {
  const el = document.createElement('div');
  el.className = 'msg-card'; el.style.borderColor = '#ef5350';
  el.innerHTML = `<div class="msg-row-top" style="opacity:0.5">${escHtml(text)}</div><div style="padding:10px 16px;font-size:0.75rem;color:#ef5350;">⚠ API Hatası: ${escHtml(errMsg)}</div><div class="msg-meta"><span>${time}</span><span>hata</span></div>`;
  appendMsg('leftMessages', el);
}

let loadCounter = 0;
function addLoading(containerId, label) {
  const id = 'load-' + (++loadCounter);
  const el = document.createElement('div');
  el.className = 'loading-card'; el.id = id;
  el.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div><span class="loading-text">${label}</span>`;
  appendMsg(containerId, el);
  return id;
}

function removeLoading(id) { document.getElementById(id)?.remove(); }

function appendMsg(containerId, el) {
  const c = document.getElementById(containerId);
  c.appendChild(el); c.scrollTop = c.scrollHeight;
}

function hideEmpty() {
  document.getElementById('leftEmpty')?.remove();
  document.getElementById('rightEmpty')?.remove();
}

function clearAll() {
  document.getElementById('leftMessages').innerHTML = '';
  document.getElementById('rightMessages').innerHTML = '';
  // Empty state yeniden ekle
  const le = document.createElement('div'); le.className='empty-state'; le.id='leftEmpty';
  le.innerHTML = `<div class="empty-icon">🎙️</div><div id="leftEmptyText">Ses bekleniyor...</div><div class="empty-hint" id="leftEmptyHint">${currentMode==='en-tr'?'Başlat düğmesine bas ve İngilizce konuş':'Başlat düğmesine bas ve Türkçe konuş'}</div>`;
  document.getElementById('leftMessages').appendChild(le);
  const re = document.createElement('div'); re.className='empty-state'; re.id='rightEmpty';
  re.innerHTML = `<div class="empty-icon">💬</div><div>Yanıt bekleniyor...</div><div class="empty-hint">Konuşma algılandığında burada görünür</div>`;
  document.getElementById('rightMessages').appendChild(re);
  document.getElementById('interimText').textContent = isListening ? (currentMode==='en-tr'?'İngilizce konuşmanızı bekliyorum...':'Türkçe konuşmanızı bekliyorum...') : 'Dinleme başlatılmadı';
}

function setStatus(text, type) {
  const pill = document.getElementById('statusPill');
  pill.textContent = text;
  pill.className = 'status-pill' + (type ? ' ' + type : '');
}

function timestamp() {
  return new Date().toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
